name: BlastRadar Risk Check
on: [pull_request]

jobs:
  risk-check:
    runs-on: ubuntu-latest
    env:
      INPUT_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      INPUT_THRESHOLD: '7'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: Blast-radar/blastradar-action@a00fc42
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          threshold: '7'
