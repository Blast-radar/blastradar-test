name: BlastRadar Risk Check
on: [pull_request]

jobs:
  risk-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: Blast-radar/blastradar-action@a00fc42948e7fe915afe382115836218eba47698
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          threshold: '7'
